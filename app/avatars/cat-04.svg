<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black cat with yellow eyes -->
  <circle cx="50" cy="50" r="50" fill="#1A1A1A"/>
  <!-- Ears -->
  <path d="M22,36 Q16,12 31,6 Q44,12 38,34" fill="#2A2A2A"/>
  <path d="M62,34 Q56,12 69,6 Q84,12 78,36" fill="#2A2A2A"/>
  <path d="M26,33 Q22,16 31,11 Q40,16 36,32" fill="#3A2A2A"/>
  <path d="M64,32 Q60,16 69,11 Q78,16 74,33" fill="#3A2A2A"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#2A2A2A"/>
  <!-- Eyes - bright yellow -->
  <ellipse cx="37" cy="47" rx="6" ry="6.5" fill="#E8C820"/>
  <ellipse cx="63" cy="47" rx="6" ry="6.5" fill="#E8C820"/>
  <ellipse cx="38" cy="46" rx="2.5" ry="4" fill="#0A0A0A"/>
  <ellipse cx="64" cy="46" rx="2.5" ry="4" fill="#0A0A0A"/>
  <circle cx="39.5" cy="44.5" r="1.5" fill="#F8E870"/>
  <circle cx="65.5" cy="44.5" r="1.5" fill="#F8E870"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#4A3030"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#3A2525" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="12" y1="54" x2="34" y2="56" stroke="#505050" stroke-width="0.7"/>
  <line x1="12" y1="59" x2="34" y2="59" stroke="#505050" stroke-width="0.7"/>
  <line x1="66" y1="56" x2="88" y2="54" stroke="#505050" stroke-width="0.7"/>
  <line x1="66" y1="59" x2="88" y2="59" stroke="#505050" stroke-width="0.7"/>
</svg>
