<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Spotted/patched multicolor cat -->
  <circle cx="50" cy="50" r="50" fill="#E8D8C0"/>
  <!-- Ears -->
  <path d="M23,36 Q18,14 32,8 Q43,14 38,34" fill="#D08030"/>
  <path d="M62,34 Q57,14 68,8 Q82,14 77,36" fill="#808080"/>
  <path d="M26,33 Q22,18 32,13 Q40,18 37,32" fill="#E0A060"/>
  <path d="M64,32 Q60,18 68,13 Q78,18 74,33" fill="#A09898"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#F0E0D0"/>
  <!-- Orange spot over left eye -->
  <circle cx="35" cy="44" r="9" fill="#E09040"/>
  <!-- Gray spot on right cheek -->
  <circle cx="66" cy="52" r="8" fill="#909090"/>
  <!-- Small black spot on forehead -->
  <circle cx="52" cy="36" r="5" fill="#3A3A3A"/>
  <!-- Orange patch near right ear -->
  <ellipse cx="68" cy="40" rx="6" ry="5" fill="#D08838"/>
  <!-- White muzzle -->
  <ellipse cx="50" cy="62" rx="14" ry="12" fill="#FAF4EE"/>
  <!-- Eyes - heterochromia -->
  <ellipse cx="38" cy="48" rx="5.5" ry="5.5" fill="#4A90D9"/>
  <ellipse cx="62" cy="48" rx="5.5" ry="5.5" fill="#7AB648"/>
  <ellipse cx="39" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <ellipse cx="63" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <circle cx="40" cy="45.5" r="1.2" fill="white"/>
  <circle cx="64" cy="45.5" r="1.2" fill="white"/>
  <!-- Nose - half pink half dark -->
  <ellipse cx="49" cy="56" rx="2" ry="2" fill="#F0A0A0"/>
  <ellipse cx="51" cy="56" rx="2" ry="2" fill="#8A6060"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#B07070" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="12" y1="54" x2="34" y2="56" stroke="#C0B0A0" stroke-width="0.7"/>
  <line x1="12" y1="59" x2="34" y2="59" stroke="#C0B0A0" stroke-width="0.7"/>
  <line x1="14" y1="63" x2="35" y2="61" stroke="#C0B0A0" stroke-width="0.7"/>
  <line x1="66" y1="56" x2="88" y2="54" stroke="#C0B0A0" stroke-width="0.7"/>
  <line x1="66" y1="59" x2="88" y2="59" stroke="#C0B0A0" stroke-width="0.7"/>
  <line x1="65" y1="61" x2="86" y2="63" stroke="#C0B0A0" stroke-width="0.7"/>
</svg>
