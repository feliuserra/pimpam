<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Siamese cat (cream body, dark face points) -->
  <circle cx="50" cy="50" r="50" fill="#F0E4D4"/>
  <!-- Ears - dark brown -->
  <path d="M23,36 Q18,14 32,8 Q43,14 38,34" fill="#4A3020"/>
  <path d="M62,34 Q57,14 68,8 Q82,14 77,36" fill="#4A3020"/>
  <path d="M26,33 Q22,18 32,13 Q40,18 37,32" fill="#6A4A3A"/>
  <path d="M64,32 Q60,18 68,13 Q78,18 74,33" fill="#6A4A3A"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#F5EAD8"/>
  <!-- Dark mask -->
  <ellipse cx="50" cy="57" rx="20" ry="18" fill="#5A3A28" opacity="0.5"/>
  <ellipse cx="50" cy="62" rx="15" ry="14" fill="#4A2A18" opacity="0.35"/>
  <!-- Eyes - striking blue -->
  <ellipse cx="38" cy="48" rx="6" ry="6" fill="#3A8AD9"/>
  <ellipse cx="62" cy="48" rx="6" ry="6" fill="#3A8AD9"/>
  <ellipse cx="39" cy="47" rx="2.5" ry="3.5" fill="#1A1A2E"/>
  <ellipse cx="63" cy="47" rx="2.5" ry="3.5" fill="#1A1A2E"/>
  <circle cx="40.5" cy="45.5" r="1.3" fill="white"/>
  <circle cx="64.5" cy="45.5" r="1.3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#6A4040"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#5A3535" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="14" y1="54" x2="36" y2="56" stroke="#8A7A6A" stroke-width="0.7"/>
  <line x1="14" y1="59" x2="36" y2="59" stroke="#8A7A6A" stroke-width="0.7"/>
  <line x1="64" y1="56" x2="86" y2="54" stroke="#8A7A6A" stroke-width="0.7"/>
  <line x1="64" y1="59" x2="86" y2="59" stroke="#8A7A6A" stroke-width="0.7"/>
</svg>
