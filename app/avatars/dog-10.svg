<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Border Collie (black/white) -->
  <circle cx="50" cy="50" r="50" fill="#1A1A1A"/>
  <!-- Semi-floppy ears -->
  <path d="M20,38 Q14,10 32,8 Q42,16 36,36" fill="#1A1A1A"/>
  <path d="M64,36 Q58,16 68,8 Q86,10 80,38" fill="#1A1A1A"/>
  <path d="M24,35 Q20,14 32,12 Q39,18 35,34" fill="#2A2A2A"/>
  <path d="M65,34 Q61,18 68,12 Q80,14 76,35" fill="#2A2A2A"/>
  <!-- Ear tips fold over -->
  <ellipse cx="24" cy="18" rx="6" ry="5" fill="#1A1A1A" transform="rotate(-20 24 18)"/>
  <ellipse cx="76" cy="18" rx="6" ry="5" fill="#1A1A1A" transform="rotate(20 76 18)"/>
  <!-- Face - black -->
  <ellipse cx="50" cy="52" rx="28" ry="27" fill="#222222"/>
  <!-- White blaze -->
  <path d="M44,30 Q50,26 56,30 L54,55 Q50,58 46,55 Z" fill="#F0F0F0"/>
  <!-- White muzzle -->
  <ellipse cx="50" cy="64" rx="16" ry="13" fill="#F0F0F0"/>
  <!-- White collar/ruff -->
  <ellipse cx="50" cy="76" rx="22" ry="10" fill="#F0F0F0"/>
  <!-- Eyes - intelligent brown -->
  <ellipse cx="38" cy="47" rx="5" ry="5.5" fill="#6A3A10"/>
  <ellipse cx="62" cy="47" rx="5" ry="5.5" fill="#6A3A10"/>
  <ellipse cx="39" cy="46" rx="2" ry="3" fill="#1A1A1A"/>
  <ellipse cx="63" cy="46" rx="2" ry="3" fill="#1A1A1A"/>
  <circle cx="40" cy="44.5" r="1.2" fill="#9A6830"/>
  <circle cx="64" cy="44.5" r="1.2" fill="#9A6830"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="5" ry="3.5" fill="#0A0A0A"/>
  <!-- Mouth -->
  <path d="M46,61 Q50,66 54,61" fill="none" stroke="#888" stroke-width="1" stroke-linecap="round"/>
</svg>
