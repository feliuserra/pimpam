<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pug (fawn, flat face) -->
  <circle cx="50" cy="50" r="50" fill="#D0A870"/>
  <!-- Small folded ears -->
  <ellipse cx="24" cy="36" rx="8" ry="10" fill="#8A6830" transform="rotate(-10 24 36)"/>
  <ellipse cx="76" cy="36" rx="8" ry="10" fill="#8A6830" transform="rotate(10 76 36)"/>
  <!-- Face - very round -->
  <ellipse cx="50" cy="52" rx="30" ry="30" fill="#E0C080"/>
  <!-- Dark mask -->
  <ellipse cx="50" cy="55" rx="22" ry="22" fill="#3A2A18" opacity="0.35"/>
  <!-- Wrinkles -->
  <path d="M38,36 Q50,32 62,36" fill="none" stroke="#A08050" stroke-width="2" stroke-linecap="round"/>
  <path d="M40,40 Q50,37 60,40" fill="none" stroke="#A08050" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Muzzle - flat -->
  <ellipse cx="50" cy="62" rx="14" ry="12" fill="#D8B878"/>
  <!-- Eyes - huge and buggy -->
  <ellipse cx="37" cy="48" rx="7" ry="7.5" fill="#3A1A08"/>
  <ellipse cx="63" cy="48" rx="7" ry="7.5" fill="#3A1A08"/>
  <circle cx="39" cy="46" r="2.5" fill="#6A3A18"/>
  <circle cx="65" cy="46" r="2.5" fill="#6A3A18"/>
  <circle cx="40" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="66" cy="45" r="1" fill="white" opacity="0.6"/>
  <!-- Big flat nose -->
  <ellipse cx="50" cy="57" rx="5.5" ry="4" fill="#1A1A1A"/>
  <circle cx="47" cy="57" r="2" fill="#2A2A2A"/>
  <circle cx="53" cy="57" r="2" fill="#2A2A2A"/>
  <!-- Mouth -->
  <path d="M43,63 Q50,68 57,63" fill="none" stroke="#7A5828" stroke-width="1" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="50" cy="67" rx="3" ry="3.5" fill="#E87888"/>
</svg>
