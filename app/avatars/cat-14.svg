<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tortoiseshell (mottled black/orange) -->
  <circle cx="50" cy="50" r="50" fill="#3A2A1A"/>
  <!-- Ears -->
  <path d="M23,36 Q18,14 32,8 Q43,14 38,34" fill="#2A1A0A"/>
  <path d="M62,34 Q57,14 68,8 Q82,14 77,36" fill="#C07030"/>
  <path d="M26,33 Q22,18 32,13 Q40,18 37,32" fill="#4A3020"/>
  <path d="M64,32 Q60,18 68,13 Q78,18 74,33" fill="#D09060"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#4A3020"/>
  <!-- Orange patches -->
  <ellipse cx="62" cy="44" rx="11" ry="10" fill="#C87030"/>
  <ellipse cx="42" cy="60" rx="10" ry="8" fill="#D08040"/>
  <ellipse cx="55" cy="67" rx="8" ry="7" fill="#B86828"/>
  <!-- Dark patches -->
  <ellipse cx="36" cy="42" rx="10" ry="9" fill="#2A1A0A"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="48" rx="5.5" ry="5.5" fill="#D4A020"/>
  <ellipse cx="62" cy="48" rx="5.5" ry="5.5" fill="#D4A020"/>
  <ellipse cx="39" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <ellipse cx="63" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <circle cx="40" cy="45.5" r="1.2" fill="#F0D060"/>
  <circle cx="64" cy="45.5" r="1.2" fill="#F0D060"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#6A4040"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#5A3535" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="12" y1="54" x2="35" y2="56" stroke="#6A5A4A" stroke-width="0.7"/>
  <line x1="12" y1="59" x2="35" y2="59" stroke="#6A5A4A" stroke-width="0.7"/>
  <line x1="65" y1="56" x2="88" y2="54" stroke="#6A5A4A" stroke-width="0.7"/>
  <line x1="65" y1="59" x2="88" y2="59" stroke="#6A5A4A" stroke-width="0.7"/>
</svg>
