<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Golden Retriever -->
  <circle cx="50" cy="50" r="50" fill="#D4A340"/>
  <!-- Floppy ears -->
  <ellipse cx="22" cy="48" rx="12" ry="18" fill="#C08A28" transform="rotate(-10 22 48)"/>
  <ellipse cx="78" cy="48" rx="12" ry="18" fill="#C08A28" transform="rotate(10 78 48)"/>
  <ellipse cx="23" cy="48" rx="9" ry="14" fill="#D09A38" transform="rotate(-10 23 48)"/>
  <ellipse cx="77" cy="48" rx="9" ry="14" fill="#D09A38" transform="rotate(10 77 48)"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="28" ry="27" fill="#DEAD50"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="62" rx="16" ry="14" fill="#F0D88A"/>
  <ellipse cx="50" cy="66" rx="12" ry="10" fill="#F5E0A0"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="46" rx="4.5" ry="5" fill="#5A3010"/>
  <ellipse cx="62" cy="46" rx="4.5" ry="5" fill="#5A3010"/>
  <circle cx="39.5" cy="44.5" r="1.5" fill="#8A6030"/>
  <circle cx="63.5" cy="44.5" r="1.5" fill="#8A6030"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="5" ry="3.5" fill="#2A1A0A"/>
  <circle cx="48" cy="56.5" r="1" fill="#4A3020"/>
  <circle cx="52" cy="56.5" r="1" fill="#4A3020"/>
  <!-- Mouth -->
  <path d="M45,61 Q50,67 55,61" fill="none" stroke="#8A6030" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="50" cy="67" rx="4" ry="5" fill="#E87080"/>
  <ellipse cx="50" cy="66" rx="3.5" ry="3" fill="#F08090"/>
  <!-- Eyebrows -->
  <path d="M33,40 Q38,37 43,40" fill="none" stroke="#B08020" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M57,40 Q62,37 67,40" fill="none" stroke="#B08020" stroke-width="1.5" stroke-linecap="round"/>
</svg>
