<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Samoyed (white, fluffy, smiling) -->
  <circle cx="50" cy="50" r="50" fill="#E8E4E0"/>
  <!-- Fluffy head outline -->
  <circle cx="34" cy="30" r="9" fill="#F0ECE8"/>
  <circle cx="66" cy="30" r="9" fill="#F0ECE8"/>
  <circle cx="50" cy="26" r="10" fill="#F0ECE8"/>
  <!-- Perky fluffy ears -->
  <path d="M22,36 Q16,10 34,8 Q44,16 38,34" fill="#E0DCD8"/>
  <path d="M62,34 Q56,16 66,8 Q84,10 78,36" fill="#E0DCD8"/>
  <path d="M25,33 Q20,14 34,12 Q41,18 37,32" fill="#E8E4E0"/>
  <path d="M63,32 Q59,18 66,12 Q80,14 75,33" fill="#E8E4E0"/>
  <!-- Face - fluffy white -->
  <ellipse cx="50" cy="52" rx="28" ry="27" fill="#F5F0EC"/>
  <!-- Cheek fluff -->
  <ellipse cx="30" cy="54" rx="8" ry="7" fill="#EAE6E2"/>
  <ellipse cx="70" cy="54" rx="8" ry="7" fill="#EAE6E2"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="62" rx="14" ry="12" fill="#FAF6F2"/>
  <!-- Eyes - dark, friendly -->
  <ellipse cx="39" cy="47" rx="4" ry="4.5" fill="#1A1208"/>
  <ellipse cx="61" cy="47" rx="4" ry="4.5" fill="#1A1208"/>
  <circle cx="40" cy="45.5" r="1.3" fill="#4A3418"/>
  <circle cx="62" cy="45.5" r="1.3" fill="#4A3418"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="4.5" ry="3" fill="#1A1A1A"/>
  <!-- Sammy smile -->
  <path d="M42,60 Q50,68 58,60" fill="none" stroke="#A09088" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tongue peek -->
  <ellipse cx="50" cy="66" rx="3" ry="3.5" fill="#F08090"/>
</svg>
