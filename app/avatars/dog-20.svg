<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Jack Russell Terrier (white/brown, perky) -->
  <circle cx="50" cy="50" r="50" fill="#E8E0D8"/>
  <!-- Half-floppy ears -->
  <path d="M22,38 Q16,10 32,10 Q42,16 36,36" fill="#8A5828"/>
  <path d="M64,36 Q58,16 68,10 Q84,10 78,38" fill="#F0E8E0"/>
  <!-- Ear tips fold -->
  <ellipse cx="23" cy="18" rx="6" ry="6" fill="#8A5828" transform="rotate(-15 23 18)"/>
  <ellipse cx="77" cy="18" rx="6" ry="6" fill="#E0D8D0" transform="rotate(15 77 18)"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="27" ry="26" fill="#F5F0EB"/>
  <!-- Brown patch over left eye/ear -->
  <ellipse cx="34" cy="42" rx="12" ry="11" fill="#8A5828"/>
  <!-- Small brown patch on right -->
  <circle cx="65" cy="36" r="5" fill="#9A6838"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="63" rx="14" ry="12" fill="#FAF6F0"/>
  <!-- Eyes - bright and alert -->
  <ellipse cx="38" cy="47" rx="4.5" ry="5" fill="#3A1A08"/>
  <ellipse cx="62" cy="47" rx="4.5" ry="5" fill="#3A1A08"/>
  <circle cx="39.5" cy="45.5" r="1.5" fill="#6A3818"/>
  <circle cx="63.5" cy="45.5" r="1.5" fill="#6A3818"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="4.5" ry="3" fill="#1A1A1A"/>
  <!-- Mouth - perky smile -->
  <path d="M44,61 Q50,67 56,61" fill="none" stroke="#A09080" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="50" cy="66" rx="3" ry="3.5" fill="#F08090"/>
</svg>
