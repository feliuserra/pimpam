<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Chocolate Labrador -->
  <circle cx="50" cy="50" r="50" fill="#5A3820"/>
  <!-- Floppy ears -->
  <ellipse cx="22" cy="48" rx="12" ry="18" fill="#4A2810" transform="rotate(-10 22 48)"/>
  <ellipse cx="78" cy="48" rx="12" ry="18" fill="#4A2810" transform="rotate(10 78 48)"/>
  <ellipse cx="23" cy="48" rx="9" ry="14" fill="#5A3418" transform="rotate(-10 23 48)"/>
  <ellipse cx="77" cy="48" rx="9" ry="14" fill="#5A3418" transform="rotate(10 77 48)"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="28" ry="27" fill="#6A4828"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="63" rx="15" ry="13" fill="#7A5838"/>
  <ellipse cx="50" cy="66" rx="11" ry="9" fill="#8A6840"/>
  <!-- Eyes - warm hazel -->
  <ellipse cx="38" cy="46" rx="5.5" ry="6" fill="#8A6020"/>
  <ellipse cx="62" cy="46" rx="5.5" ry="6" fill="#8A6020"/>
  <ellipse cx="39" cy="45" rx="2.5" ry="3.5" fill="#2A1A08"/>
  <ellipse cx="63" cy="45" rx="2.5" ry="3.5" fill="#2A1A08"/>
  <circle cx="40.5" cy="43.5" r="1.3" fill="#B08830"/>
  <circle cx="64.5" cy="43.5" r="1.3" fill="#B08830"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="5.5" ry="4" fill="#3A2010"/>
  <!-- Mouth -->
  <path d="M45,61 Q50,67 55,61" fill="none" stroke="#5A3A20" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Happy tongue -->
  <ellipse cx="50" cy="68" rx="4" ry="5" fill="#E07080"/>
</svg>
