<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pit Bull (gray/blue, muscular face) -->
  <circle cx="50" cy="50" r="50" fill="#6A7078"/>
  <!-- Rose ears (half-folded) -->
  <path d="M22,36 Q18,16 32,14 Q38,20 34,36" fill="#5A6068"/>
  <path d="M66,36 Q62,20 68,14 Q82,16 78,36" fill="#5A6068"/>
  <ellipse cx="26" cy="22" rx="5" ry="5" fill="#5A6068" transform="rotate(-15 26 22)"/>
  <ellipse cx="74" cy="22" rx="5" ry="5" fill="#5A6068" transform="rotate(15 74 22)"/>
  <!-- Face - wide and blocky -->
  <ellipse cx="50" cy="52" rx="30" ry="28" fill="#7A8088"/>
  <!-- White chest patch -->
  <ellipse cx="50" cy="72" rx="16" ry="12" fill="#E8E8E8"/>
  <!-- White blaze on chest coming up -->
  <path d="M46,60 Q50,56 54,60 L53,74 Q50,76 47,74 Z" fill="#E8E8E8"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="62" rx="16" ry="13" fill="#8A9098"/>
  <ellipse cx="50" cy="65" rx="12" ry="9" fill="#98A0A8"/>
  <!-- Eyes - warm, kind -->
  <ellipse cx="37" cy="47" rx="5.5" ry="5.5" fill="#6A4018"/>
  <ellipse cx="63" cy="47" rx="5.5" ry="5.5" fill="#6A4018"/>
  <ellipse cx="38" cy="46" rx="2.5" ry="3" fill="#1A1A1A"/>
  <ellipse cx="64" cy="46" rx="2.5" ry="3" fill="#1A1A1A"/>
  <circle cx="39.5" cy="44.5" r="1.3" fill="#9A6830"/>
  <circle cx="65.5" cy="44.5" r="1.3" fill="#9A6830"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="5.5" ry="4" fill="#4A4A4A"/>
  <!-- Mouth - big smile -->
  <path d="M42,62 Q50,70 58,62" fill="none" stroke="#5A6068" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="50" cy="68" rx="4" ry="4.5" fill="#F07888"/>
</svg>
