<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Silver tabby -->
  <circle cx="50" cy="50" r="50" fill="#B0B8C0"/>
  <!-- Ears -->
  <path d="M23,36 Q18,14 32,8 Q43,14 38,34" fill="#A0A8B0"/>
  <path d="M62,34 Q57,14 68,8 Q82,14 77,36" fill="#A0A8B0"/>
  <path d="M26,33 Q22,18 32,13 Q40,18 37,32" fill="#C0B0B8"/>
  <path d="M64,32 Q60,18 68,13 Q78,18 74,33" fill="#C0B0B8"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#C0C8D0"/>
  <!-- Tabby M marking -->
  <path d="M36,34 Q42,28 50,36 Q58,28 64,34" fill="none" stroke="#606870" stroke-width="2" stroke-linecap="round"/>
  <!-- Tabby stripes on cheeks -->
  <path d="M28,46 Q33,43 36,47" fill="none" stroke="#606870" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M27,50 Q33,47 35,51" fill="none" stroke="#606870" stroke-width="1" stroke-linecap="round"/>
  <path d="M64,47 Q67,43 72,46" fill="none" stroke="#606870" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M65,51 Q67,47 73,50" fill="none" stroke="#606870" stroke-width="1" stroke-linecap="round"/>
  <!-- Lighter muzzle -->
  <ellipse cx="50" cy="62" rx="14" ry="12" fill="#E0E4E8"/>
  <!-- Eyes - green -->
  <ellipse cx="38" cy="48" rx="5.5" ry="5.5" fill="#5AAA5A"/>
  <ellipse cx="62" cy="48" rx="5.5" ry="5.5" fill="#5AAA5A"/>
  <ellipse cx="39" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <ellipse cx="63" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <circle cx="40" cy="45.5" r="1.2" fill="white"/>
  <circle cx="64" cy="45.5" r="1.2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#C0A0A0"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#A08888" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="12" y1="54" x2="36" y2="56" stroke="#909898" stroke-width="0.7"/>
  <line x1="12" y1="59" x2="36" y2="59" stroke="#909898" stroke-width="0.7"/>
  <line x1="64" y1="56" x2="88" y2="54" stroke="#909898" stroke-width="0.7"/>
  <line x1="64" y1="59" x2="88" y2="59" stroke="#909898" stroke-width="0.7"/>
</svg>
