<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Australian Shepherd (blue merle) -->
  <circle cx="50" cy="50" r="50" fill="#6A7A8A"/>
  <!-- Semi-floppy ears -->
  <path d="M20,38 Q14,10 32,8 Q42,16 36,36" fill="#4A5A6A"/>
  <path d="M64,36 Q58,16 68,8 Q86,10 80,38" fill="#8A5828"/>
  <!-- Ear fold tips -->
  <ellipse cx="24" cy="18" rx="6" ry="5" fill="#4A5A6A" transform="rotate(-20 24 18)"/>
  <ellipse cx="76" cy="18" rx="6" ry="5" fill="#8A5828" transform="rotate(20 76 18)"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="28" ry="27" fill="#7A8A98"/>
  <!-- Merle patches -->
  <circle cx="36" cy="42" r="6" fill="#4A5868"/>
  <circle cx="58" cy="38" r="5" fill="#3A4858"/>
  <circle cx="68" cy="48" r="4" fill="#8A6030"/>
  <circle cx="30" cy="52" r="4.5" fill="#3A4858"/>
  <!-- White blaze -->
  <path d="M44,32 Q50,28 56,32 L54,55 Q50,58 46,55 Z" fill="#F0ECE8"/>
  <!-- White muzzle -->
  <ellipse cx="50" cy="64" rx="15" ry="13" fill="#F0ECE8"/>
  <!-- Copper cheeks -->
  <ellipse cx="34" cy="56" rx="5" ry="4" fill="#C08838"/>
  <ellipse cx="66" cy="56" rx="5" ry="4" fill="#C08838"/>
  <!-- Eyes - heterochromia -->
  <ellipse cx="38" cy="47" rx="5" ry="5.5" fill="#4A90D9"/>
  <ellipse cx="62" cy="47" rx="5" ry="5.5" fill="#6A4018"/>
  <ellipse cx="39" cy="46" rx="2" ry="3" fill="#1A1A2E"/>
  <ellipse cx="63" cy="46" rx="2" ry="3" fill="#1A1A2E"/>
  <circle cx="40" cy="44.5" r="1.2" fill="white"/>
  <circle cx="64" cy="44.5" r="1.2" fill="#9A6828"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="5" ry="3.5" fill="#1A1A1A"/>
  <!-- Mouth -->
  <path d="M46,61 Q50,66 54,61" fill="none" stroke="#888" stroke-width="1" stroke-linecap="round"/>
</svg>
