  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#C08080" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="14" y1="53" x2="36" y2="55" stroke="#C0C0C0" stroke-width="0.7"/>
  <line x1="14" y1="58" x2="36" y2="58" stroke="#C0C0C0" stroke-width="0.7"/>
  <line x1="64" y1="55" x2="86" y2="53" stroke="#C0C0C0" stroke-width="0.7"/>
  <line x1="64" y1="58" x2="86" y2="58" stroke="#C0C0C0" stroke-width="0.7"/>
</svg>
