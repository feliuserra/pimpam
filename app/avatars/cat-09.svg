<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Russian Blue (blue-gray, vivid green eyes) -->
  <circle cx="50" cy="50" r="50" fill="#6A7B8A"/>
  <!-- Ears -->
  <path d="M24,36 Q20,16 33,10 Q42,16 38,34" fill="#5A6B7A"/>
  <path d="M62,34 Q58,16 67,10 Q80,16 76,36" fill="#5A6B7A"/>
  <path d="M27,33 Q24,19 33,14 Q39,19 36,32" fill="#8A7A8A"/>
  <path d="M64,32 Q61,19 67,14 Q76,19 73,33" fill="#8A7A8A"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="27" ry="25" fill="#7A8B9A"/>
  <!-- Lighter muzzle -->
  <ellipse cx="50" cy="62" rx="12" ry="10" fill="#9AABB8"/>
  <!-- Eyes - vivid green -->
  <ellipse cx="38" cy="48" rx="6" ry="6" fill="#30B830"/>
  <ellipse cx="62" cy="48" rx="6" ry="6" fill="#30B830"/>
  <ellipse cx="39" cy="47" rx="2.5" ry="3.5" fill="#1A1A2E"/>
  <ellipse cx="63" cy="47" rx="2.5" ry="3.5" fill="#1A1A2E"/>
  <circle cx="40.5" cy="45.5" r="1.3" fill="#80E880"/>
  <circle cx="64.5" cy="45.5" r="1.3" fill="#80E880"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#8A6868"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,61 53,58" fill="none" stroke="#7A5858" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="14" y1="54" x2="36" y2="56" stroke="#5A6A78" stroke-width="0.7"/>
  <line x1="14" y1="59" x2="36" y2="59" stroke="#5A6A78" stroke-width="0.7"/>
  <line x1="64" y1="56" x2="86" y2="54" stroke="#5A6A78" stroke-width="0.7"/>
  <line x1="64" y1="59" x2="86" y2="59" stroke="#5A6A78" stroke-width="0.7"/>
</svg>
