<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black Labrador -->
  <circle cx="50" cy="50" r="50" fill="#1A1A1A"/>
  <!-- Floppy ears -->
  <ellipse cx="22" cy="48" rx="12" ry="18" fill="#101010" transform="rotate(-10 22 48)"/>
  <ellipse cx="78" cy="48" rx="12" ry="18" fill="#101010" transform="rotate(10 78 48)"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="28" ry="27" fill="#222222"/>
  <!-- Muzzle - slightly lighter -->
  <ellipse cx="50" cy="63" rx="15" ry="13" fill="#2A2A2A"/>
  <ellipse cx="50" cy="66" rx="11" ry="9" fill="#333333"/>
  <!-- Eyes - warm brown -->
  <ellipse cx="38" cy="46" rx="5.5" ry="6" fill="#6A4018"/>
  <ellipse cx="62" cy="46" rx="5.5" ry="6" fill="#6A4018"/>
  <ellipse cx="39" cy="45" rx="2.5" ry="3.5" fill="#0A0A0A"/>
  <ellipse cx="63" cy="45" rx="2.5" ry="3.5" fill="#0A0A0A"/>
  <circle cx="40.5" cy="43.5" r="1.5" fill="#9A7030"/>
  <circle cx="64.5" cy="43.5" r="1.5" fill="#9A7030"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="5.5" ry="4" fill="#0A0A0A"/>
  <!-- Mouth -->
  <path d="M45,61 Q50,67 55,61" fill="none" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tongue peeking -->
  <ellipse cx="50" cy="67" rx="3.5" ry="4" fill="#E07080"/>
</svg>
