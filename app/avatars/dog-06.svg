<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Beagle (tricolor) -->
  <circle cx="50" cy="50" r="50" fill="#C09050"/>
  <!-- Floppy ears - big and brown -->
  <ellipse cx="20" cy="52" rx="14" ry="20" fill="#6A3A10" transform="rotate(-12 20 52)"/>
  <ellipse cx="80" cy="52" rx="14" ry="20" fill="#6A3A10" transform="rotate(12 80 52)"/>
  <ellipse cx="21" cy="52" rx="10" ry="16" fill="#7A4A20" transform="rotate(-12 21 52)"/>
  <ellipse cx="79" cy="52" rx="10" ry="16" fill="#7A4A20" transform="rotate(12 79 52)"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="27" ry="26" fill="#E0B070"/>
  <!-- White blaze + muzzle -->
  <path d="M44,32 Q50,28 56,32 L55,55 Q50,58 45,55 Z" fill="#F5F0E8"/>
  <ellipse cx="50" cy="63" rx="15" ry="13" fill="#F5F0E8"/>
  <!-- Black saddle marking on top -->
  <path d="M32,32 Q50,22 68,32 L64,40 Q50,34 36,40 Z" fill="#2A1A0A" opacity="0.6"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="47" rx="4.5" ry="5" fill="#5A3010"/>
  <ellipse cx="62" cy="47" rx="4.5" ry="5" fill="#5A3010"/>
  <circle cx="39.5" cy="45.5" r="1.3" fill="#8A5828"/>
  <circle cx="63.5" cy="45.5" r="1.3" fill="#8A5828"/>
  <!-- Nose -->
  <ellipse cx="50" cy="57" rx="5" ry="3.5" fill="#1A1A1A"/>
  <!-- Mouth -->
  <path d="M46,61 Q50,66 54,61" fill="none" stroke="#8A6838" stroke-width="1" stroke-linecap="round"/>
</svg>
