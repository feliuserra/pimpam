<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Brown tabby -->
  <circle cx="50" cy="50" r="50" fill="#8A6A4A"/>
  <!-- Ears -->
  <path d="M23,36 Q18,14 32,8 Q43,14 38,34" fill="#7A5A3A"/>
  <path d="M62,34 Q57,14 68,8 Q82,14 77,36" fill="#7A5A3A"/>
  <path d="M26,33 Q22,18 32,13 Q40,18 37,32" fill="#A08070"/>
  <path d="M64,32 Q60,18 68,13 Q78,18 74,33" fill="#A08070"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#9A7A58"/>
  <!-- Tabby M on forehead -->
  <path d="M36,34 Q42,28 50,36 Q58,28 64,34" fill="none" stroke="#5A3A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Tabby stripes -->
  <path d="M30,44 Q34,42 37,45" fill="none" stroke="#5A3A1A" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M63,45 Q66,42 70,44" fill="none" stroke="#5A3A1A" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Lighter muzzle -->
  <ellipse cx="50" cy="62" rx="14" ry="12" fill="#C0A080"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="48" rx="5.5" ry="5.5" fill="#D4A020"/>
  <ellipse cx="62" cy="48" rx="5.5" ry="5.5" fill="#D4A020"/>
  <ellipse cx="39" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <ellipse cx="63" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <circle cx="40" cy="45.5" r="1.2" fill="#F0D060"/>
  <circle cx="64" cy="45.5" r="1.2" fill="#F0D060"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#8A5050"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#7A4545" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="12" y1="54" x2="35" y2="56" stroke="#6A5A4A" stroke-width="0.7"/>
  <line x1="12" y1="59" x2="35" y2="59" stroke="#6A5A4A" stroke-width="0.7"/>
  <line x1="65" y1="56" x2="88" y2="54" stroke="#6A5A4A" stroke-width="0.7"/>
  <line x1="65" y1="59" x2="88" y2="59" stroke="#6A5A4A" stroke-width="0.7"/>
</svg>
