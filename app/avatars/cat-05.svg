<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calico cat (white/orange/black patches) -->
  <circle cx="50" cy="50" r="50" fill="#F0E8E0"/>
  <!-- Ears -->
  <path d="M23,36 Q18,14 32,8 Q43,14 38,34" fill="#E08030"/>
  <path d="M62,34 Q57,14 68,8 Q82,14 77,36" fill="#2A2A2A"/>
  <path d="M26,33 Q22,18 32,13 Q40,18 37,32" fill="#E8B090"/>
  <path d="M64,32 Q60,18 68,13 Q78,18 74,33" fill="#4A3A3A"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#FAF4EE"/>
  <!-- Orange patch over left eye -->
  <ellipse cx="36" cy="44" rx="12" ry="10" fill="#E89050"/>
  <!-- Black patch over right ear -->
  <ellipse cx="64" cy="40" rx="10" ry="9" fill="#2A2A2A"/>
  <!-- Eyes (heterochromia) -->
  <ellipse cx="38" cy="48" rx="5" ry="5.5" fill="#7AB648"/>
  <ellipse cx="62" cy="48" rx="5" ry="5.5" fill="#D4A020"/>
  <ellipse cx="39" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <ellipse cx="63" cy="47" rx="2" ry="3" fill="#1A1A2E"/>
  <circle cx="40" cy="45.5" r="1" fill="white"/>
  <circle cx="64" cy="45.5" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#E08080"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#C07070" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="14" y1="54" x2="36" y2="56" stroke="#C0A090" stroke-width="0.7"/>
  <line x1="14" y1="59" x2="36" y2="59" stroke="#C0A090" stroke-width="0.7"/>
  <line x1="64" y1="56" x2="86" y2="54" stroke="#C0A090" stroke-width="0.7"/>
  <line x1="64" y1="59" x2="86" y2="59" stroke="#C0A090" stroke-width="0.7"/>
</svg>
