<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Red/dark ginger cat -->
  <circle cx="50" cy="50" r="50" fill="#C05828"/>
  <!-- Ears -->
  <path d="M23,36 Q18,14 32,8 Q43,14 38,34" fill="#A84818"/>
  <path d="M62,34 Q57,14 68,8 Q82,14 77,36" fill="#A84818"/>
  <path d="M26,33 Q22,18 32,13 Q40,18 37,32" fill="#C07048"/>
  <path d="M64,32 Q60,18 68,13 Q78,18 74,33" fill="#C07048"/>
  <!-- Face -->
  <ellipse cx="50" cy="54" rx="28" ry="26" fill="#D06830"/>
  <!-- Lighter muzzle -->
  <ellipse cx="50" cy="62" rx="14" ry="12" fill="#E8A878"/>
  <!-- Subtle tabby stripes -->
  <path d="M38,36 Q50,30 62,36" fill="none" stroke="#8A3010" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyes - round, amber -->
  <ellipse cx="38" cy="48" rx="6" ry="6.5" fill="#D8A828"/>
  <ellipse cx="62" cy="48" rx="6" ry="6.5" fill="#D8A828"/>
  <ellipse cx="39" cy="46.5" rx="2.5" ry="3.5" fill="#1A1A2E"/>
  <ellipse cx="63" cy="46.5" rx="2.5" ry="3.5" fill="#1A1A2E"/>
  <circle cx="40.5" cy="45" r="1.3" fill="#F0D060"/>
  <circle cx="64.5" cy="45" r="1.3" fill="#F0D060"/>
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="3" ry="2" fill="#A05050"/>
  <!-- Mouth -->
  <path d="M47,58 Q50,62 53,58" fill="none" stroke="#884040" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="12" y1="54" x2="34" y2="56" stroke="#A06040" stroke-width="0.7"/>
  <line x1="12" y1="59" x2="34" y2="59" stroke="#A06040" stroke-width="0.7"/>
  <line x1="14" y1="63" x2="35" y2="61" stroke="#A06040" stroke-width="0.7"/>
  <line x1="66" y1="56" x2="88" y2="54" stroke="#A06040" stroke-width="0.7"/>
  <line x1="66" y1="59" x2="88" y2="59" stroke="#A06040" stroke-width="0.7"/>
  <line x1="65" y1="61" x2="86" y2="63" stroke="#A06040" stroke-width="0.7"/>
</svg>
